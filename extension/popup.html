<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redtick</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        width: 16rem;
        margin: 0;
        padding: 0.9rem;
        color: #1a1a1a;
      }
      h1 { font-size: 1rem; margin: 0 0 0.5rem; }
      p { font-size: 0.85rem; color: #444; margin: 0.35rem 0; }
      code { background: #f0f0f0; padding: 0 0.2rem; border-radius: 3px; }
      button {
        margin-top: 0.6rem;
        padding: 0.4rem 0.8rem;
        font-weight: 600;
        color: #fff;
        background: #a11c1c;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Redtick</h1>
    <p id="state">Not configured yet.</p>
    <p>
      Open a Redmine issue and click <strong>▶ Start in Redtick</strong> on the
      page to start a timer.
    </p>
    <button id="settings">Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
