<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redtick — Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 34rem;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 { font-size: 1.3rem; }
      label { display: block; font-weight: 600; margin: 1rem 0 0.35rem; }
      input[type="url"] {
        width: 100%;
        padding: 0.5rem;
        font-size: 1rem;
        box-sizing: border-box;
      }
      button {
        margin-top: 1rem;
        padding: 0.5rem 1rem;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: #a11c1c;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .hint { color: #555; font-size: 0.85rem; margin-top: 0.35rem; }
      #status { margin-top: 1rem; font-weight: 600; min-height: 1.2em; }
      #status.ok { color: #157a3d; }
      #status.err { color: #a11c1c; }
    </style>
  </head>
  <body>
    <h1>Redtick browser integration</h1>
    <p>
      Enter your Redmine site URL. The extension will add a
      <strong>▶ Start in Redtick</strong> button to that site's issue pages.
      The Redtick desktop app must be installed and running.
    </p>

    <label for="host">Redmine base URL</label>
    <input
      id="host"
      type="url"
      placeholder="https://redmine.example.com"
      autocomplete="off"
    />
    <div class="hint">e.g. <code>https://servicedesk.sumanet.cz</code></div>

    <button id="save">Save &amp; enable</button>
    <div id="status" role="status" aria-live="polite"></div>

    <script src="options.js"></script>
  </body>
</html>
