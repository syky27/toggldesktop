# ffigen configuration — generates the FULL Dart FFI binding surface from the
# core C header (~205 functions + all view structs). Run with:
#
#   cd app && dart run ffigen --config ffigen.yaml
#
# Requires libclang (LLVM). The generated file supersedes the hand-written
# focused subset in lib/src/native/toggl_bindings.dart. Implements FP-20.
#
# ABI note (ADR-0001): on non-Windows, the header's `char_t` resolves to `char`
# (UTF-8). Parsing on Linux/macOS picks that branch automatically because
# `_WIN32` is undefined.
name: TogglApiBindings
description: Generated FFI bindings for the Toggl/Redmine C core (src/toggl_api.h).
output: 'lib/src/native/toggl_api_generated.dart'
headers:
  entry-points:
    - '../src/toggl_api.h'
  include-directives:
    - '../src/toggl_api.h'
functions:
  include:
    - 'toggl_.*'
structs:
  include:
    - 'Toggl.*'
typedefs:
  include:
    - 'TogglDisplay.*'
    - 'TogglContinueSignIn'
enums:
  include:
    - 'Toggl.*'
comments:
  style: any
  length: full
preamble: |
  // GENERATED CODE — DO NOT MODIFY BY HAND.
  // Regenerate with: dart run ffigen --config ffigen.yaml
  // ignore_for_file: type=lint, unused_field, unused_element, camel_case_types, non_constant_identifier_names
