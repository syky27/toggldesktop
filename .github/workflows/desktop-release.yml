# Release pipeline for the `redtick` Flutter desktop app.
# On a v* tag (or manual dispatch) build each desktop OS, package a polished
# installer (Linux AppImage, macOS .dmg, Windows Inno Setup .exe), and attach
# them to a DRAFT GitHub Release. Artifacts are UNSIGNED in this iteration.
name: desktop-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Read-only by default; only the release job is granted write to create a Release.
permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  build:
    name: build-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
          - os: macos-14
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Compute version + tag
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          PUBSPEC_BUILD="${PUBSPEC_VERSION#*+}"
          if [[ "$PUBSPEC_BUILD" == "$PUBSPEC_VERSION" ]]; then PUBSPEC_BUILD="1"; fi
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$REF"; RAW_VERSION="${REF#v}"; VERSION="${RAW_VERSION%%+*}"
            if [[ "$RAW_VERSION" == *+* ]]; then BUILD="${RAW_VERSION#*+}"; else BUILD="${GITHUB_RUN_NUMBER}"; fi
          else
            VERSION="${PUBSPEC_VERSION%%+*}"
            BUILD="$PUBSPEC_BUILD"
            TAG="${REF//\//-}-dev"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"

      - name: Install Linux desktop build deps
        if: matrix.target == 'linux'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libxss-dev libx11-dev file

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-${{ matrix.target }}-desktop
      - run: flutter build ${{ matrix.target }} --release --build-name=${{ steps.ver.outputs.version }} --build-number=${{ steps.ver.outputs.build }} --dart-define=REDTICK_RELEASE_TAG=${{ steps.ver.outputs.tag }} --dart-define=REDTICK_RELEASE_REPOSITORY=${{ github.repository }}
        env:
          # permission_handler_windows (transitive via live_activities) includes
          # C++/WinRT's <experimental/coroutine>, rejected as a hard error by the
          # current MSVC STL (STL1011). cl.exe reads $CL per TU. Ignored elsewhere.
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS

      # ---- Linux: AppImage ----
      - name: Package AppImage
        if: matrix.target == 'linux'
        run: |
          set -e
          APPDIR=AppDir
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          cp -r build/linux/x64/release/bundle/. "$APPDIR/usr/bin/"
          # Bundle libXss.so.1 (X11 ScreenSaver ext, idle-detection fallback in
          # runner/my_application.cc). It is a DIRECT DT_NEEDED of redtick whose
          # DT_RUNPATH is $ORIGIN/lib, so a copy in usr/bin/lib/ is found by the
          # loader. libXss is NOT on the AppImage excludelist; its own X11 deps
          # ARE, so we leave libX11/libXext/libxcb to the host.
          BIN="$APPDIR/usr/bin/redtick"
          XSS=$(ldd "$BIN" | awk '/libXss\.so\.1/ {print $3; exit}')
          if [ -z "$XSS" ] || [ ! -e "$XSS" ]; then
            echo "::error::Could not resolve libXss.so.1 for $BIN"; ldd "$BIN" || true; exit 1
          fi
          cp -L "$XSS" "$APPDIR/usr/bin/lib/libXss.so.1"
          echo "Bundled libXss.so.1 from $XSS"
          cp packaging/linux/redtick.desktop "$APPDIR/redtick.desktop"
          cp packaging/linux/AppRun "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"
          cp assets/icon/icon_master.png "$APPDIR/redtick.png"
          cp assets/icon/icon_master.png "$APPDIR/.DirIcon"
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          # Modern static type-2 runtime: uses fusermount3, so the AppImage no
          # longer hard-requires libfuse2 on FUSE3-only distros (Ubuntu 24.04, …).
          wget -q https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64 -O runtime-x86_64
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool --no-appstream \
            --runtime-file runtime-x86_64 \
            "$APPDIR" "redtick-${{ steps.ver.outputs.tag }}-x86_64.AppImage"

      # ---- macOS: sign + notarize (gated on signing secrets) ----
      # When the Developer ID cert secrets are present (maintainer tag runs),
      # import the cert into an ephemeral keychain, deep-sign with Hardened
      # Runtime, notarize + staple. Forks / secret-less runs skip this and ship an
      # UNSIGNED .dmg, exactly as before. macOS does NOT use fastlane match — the
      # Developer ID cert is supplied directly as a .p12 secret (match can't
      # reliably manage Developer ID certs). See docs/RELEASE_SIGNING.md.
      - name: Detect macOS signing capability
        id: macsign
        if: matrix.target == 'macos'
        shell: bash
        run: |
          if [[ -n "${{ secrets.MACOS_CERT_P12_BASE64 }}" && -n "${{ secrets.ASC_KEY_P8_BASE64 }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::macOS signing secrets absent — producing an UNSIGNED .dmg."
          fi

      - name: Import Developer ID certificate
        if: matrix.target == 'macos' && steps.macsign.outputs.enabled == 'true'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/redtick-signing.keychain-db"
          CERT="$RUNNER_TEMP/devid.p12"
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT"
          echo "Decoded .p12: $(wc -c < "$CERT") bytes"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Import the identity. `security import` can reject a newer-format .p12
          # ("Unknown format"); if so, normalize it with openssl and retry.
          if ! security import "$CERT" -P "$MACOS_CERT_PASSWORD" -A -f pkcs12 \
               -k "$KEYCHAIN" -T /usr/bin/codesign 2>/tmp/imp.err; then
            echo "Direct import failed ($(cat /tmp/imp.err)); normalizing .p12 via openssl…"
            OSSL=$([ -x /opt/homebrew/opt/openssl@3/bin/openssl ] \
              && echo /opt/homebrew/opt/openssl@3/bin/openssl || command -v openssl)
            ( "$OSSL" pkcs12 -in "$CERT" -nodes -passin "pass:$MACOS_CERT_PASSWORD" -out "$RUNNER_TEMP/d.pem" 2>/tmp/o.err \
              || "$OSSL" pkcs12 -in "$CERT" -nodes -legacy -passin "pass:$MACOS_CERT_PASSWORD" -out "$RUNNER_TEMP/d.pem" 2>>/tmp/o.err ) \
              || { echo "::error::MACOS_CERT_P12_BASE64 is not a valid PKCS#12 for MACOS_CERT_PASSWORD — re-export the .p12 and re-set the secret (see docs/RELEASE_SIGNING.md). openssl: $(cat /tmp/o.err)"; exit 1; }
            "$OSSL" pkcs12 -export -legacy -in "$RUNNER_TEMP/d.pem" -out "$CERT" -passout "pass:$MACOS_CERT_PASSWORD" 2>/dev/null \
              || "$OSSL" pkcs12 -export -in "$RUNNER_TEMP/d.pem" -out "$CERT" -passout "pass:$MACOS_CERT_PASSWORD"
            rm -f "$RUNNER_TEMP/d.pem"
            security import "$CERT" -P "$MACOS_CERT_PASSWORD" -A -f pkcs12 \
              -k "$KEYCHAIN" -T /usr/bin/codesign
          fi
          # Allow codesign to use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Add our keychain to the search list (preserve the existing login keychain).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KEYCHAIN"
          rm -f "$CERT"

      # ---- macOS: .dmg (signed + notarized when secrets present, else unsigned) ----
      - name: Package DMG
        if: matrix.target == 'macos'
        env:
          SIGN: ${{ steps.macsign.outputs.enabled }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -e
          brew install create-dmg
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -n1)
          DMG="redtick-${{ steps.ver.outputs.tag }}.dmg"

          if [ "$SIGN" = "true" ]; then
            KEYCHAIN="$RUNNER_TEMP/redtick-signing.keychain-db"
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
              | awk '/Developer ID Application/ {print $2; exit}')
            ENT="macos/Runner/Release.entitlements"
            # Inner frameworks/dylibs first (Hardened Runtime via --options runtime), app last.
            find "$APP/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -print0 \
              | while IFS= read -r -d '' f; do
                  codesign --force --options runtime --timestamp --sign "$IDENTITY" "$f"
                done
            codesign --force --options runtime --timestamp \
              --entitlements "$ENT" --sign "$IDENTITY" "$APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
            # Notarize + staple the app (App Store Connect API key).
            P8="$RUNNER_TEMP/asc.p8"; echo -n "$ASC_KEY_P8_BASE64" | base64 --decode > "$P8"
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"
            xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
              --key "$P8" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" --wait
            xcrun stapler staple "$APP"
          fi

          create-dmg \
            --volname "Redtick" \
            --window-size 540 360 \
            --icon-size 100 \
            --icon "$(basename "$APP")" 150 185 \
            --app-drop-link 390 185 \
            --no-internet-enable \
            "$DMG" "$APP" \
          || hdiutil create -volname "Redtick" -srcfolder "$APP" -ov -format UDZO "$DMG"

          if [ "$SIGN" = "true" ]; then
            # Notarize + staple the DMG too (offline mount).
            xcrun notarytool submit "$DMG" \
              --key "$P8" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" --wait
            xcrun stapler staple "$DMG"
            rm -f "$P8"
          fi

      - name: Clean up signing keychain
        if: always() && matrix.target == 'macos' && steps.macsign.outputs.enabled == 'true'
        run: security delete-keychain "$RUNNER_TEMP/redtick-signing.keychain-db" || true

      # ---- Windows: Inno Setup installer (unsigned) ----
      - name: Package installer (Inno Setup)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $rel = "build\windows\x64\runner\Release"
          # Bundle the VC++ runtime so it runs on a clean Windows install.
          foreach ($dll in @('msvcp140.dll','vcruntime140.dll','vcruntime140_1.dll')) {
            $src = Join-Path $env:SystemRoot "System32\$dll"
            if (Test-Path $src) { Copy-Item $src -Destination $rel -Force }
          }
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & "$iscc" `
            /DMyAppVersion=${{ steps.ver.outputs.version }} `
            /DBuildDir="$((Resolve-Path $rel).Path)" `
            /DOutputDir="$((Resolve-Path .).Path)" `
            /DOutputName="redtick-${{ steps.ver.outputs.tag }}-setup" `
            packaging\windows\redtick.iss

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            app/redtick-*.AppImage
            app/redtick-*.dmg
            app/redtick-*-setup.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/redtick-*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            ## Downloads

            - **macOS** — `redtick-*.dmg` (Apple Silicon). Signed with a Developer ID
              and notarized by Apple — it opens normally, no Gatekeeper workaround
              needed.
            - **Windows** — `redtick-*-setup.exe`. Not code-signed yet: SmartScreen may
              warn for an unknown publisher — **More info → Run anyway**.
            - **Linux** — `redtick-*-x86_64.AppImage`. `chmod +x` it and run; needs
              system GTK 3 (libfuse2 no longer required on FUSE3 distros).
            - **Android** — `redtick-*-arm64-v8a.apk` (most phones; `armeabi-v7a` for
              older 32-bit devices, `x86_64` for emulators). Sideload: enable "install
              unknown apps" for your browser/file manager, then open the APK. Not on
              Google Play yet, so you may see an "unverified developer" prompt. The
              Android APKs are attached by the separate `android-release` workflow.
            - **Browser extension** — `redtick-browser-extension-*.zip` for Chrome,
              Edge, and Brave; extract it, then load the extracted folder as an
              unpacked extension. Firefox users should install the AMO-signed
              `redtick-browser-extension-firefox-*.xpi` when present. The extension
              artifacts are attached by the separate `browser-extension` workflow.

            The macOS build is signed + notarized. Windows, Linux, and Android APKs
            are not code-signed by a platform authority yet (the Android APKs are
            signed with the project upload key, which is enough to install).
