# iOS release pipeline for the `redtick` Flutter app.
# On a v* tag (or manual dispatch), build the iOS app + Live Activity extension,
# sign directly (Distribution cert imported from a .p12 secret + App Store
# profiles fetched read-only via the App Store Connect API key — no match), and
# upload to TestFlight. See docs/RELEASE_SIGNING.md.
#
# Gated on signing secrets: forks / secret-less runs skip cleanly (iOS can't
# build for TestFlight without signing). Only maintainer tag pushes / dispatch
# can trigger a real upload.
name: ios-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  testflight:
    # macos-15 ships Xcode 16, required to open the iOS project's file-system
    # synchronized groups (the Live Activity extension); macos-14's Xcode 15
    # crashes on them.
    runs-on: macos-15
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Detect signing capability
        id: signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.ASC_KEY_P8_BASE64 }}" && -n "${{ secrets.IOS_DIST_CERT_P12_BASE64 }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS signing secrets absent — skipping TestFlight upload."
          fi

      - name: Compute version + build number
        id: ver
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW="${REF#v}"; VERSION="${RAW%%+*}"
          else
            VERSION="${PUBSPEC_VERSION%%+*}"
          fi
          # TestFlight requires a strictly-increasing build number across uploads;
          # GITHUB_RUN_NUMBER is monotonic per workflow.
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: ruby/setup-ruby@v1
        if: steps.signing.outputs.enabled == 'true'
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: app

      - uses: subosito/flutter-action@v2
        if: steps.signing.outputs.enabled == 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
        if: steps.signing.outputs.enabled == 'true'

      # Generate the iOS build config (Generated.xcconfig with version/build +
      # dart-defines) without a full build; fastlane `gym` does the real archive.
      - name: Configure iOS build
        if: steps.signing.outputs.enabled == 'true'
        run: |
          flutter build ios --config-only --release --no-codesign \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.build }} \
            --dart-define=REDTICK_RELEASE_TAG=${{ github.ref_name }} \
            --dart-define=REDTICK_RELEASE_REPOSITORY=${{ github.repository }}

      - name: CocoaPods install
        if: steps.signing.outputs.enabled == 'true'
        working-directory: app/ios
        run: pod install

      # Import the Distribution cert into an ephemeral keychain, then archive +
      # upload (one step so the keychain context carries into fastlane/gym).
      - name: Build + upload to TestFlight
        if: steps.signing.outputs.enabled == 'true'
        env:
          CI: "true"
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/redtick-ios.keychain-db"
          CERT="$RUNNER_TEMP/ios_dist.p12"
          echo -n "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$IOS_DIST_CERT_PASSWORD" -A -f pkcs12 \
            -k "$KEYCHAIN" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make this keychain the default + first in the search list so gym's
          # xcodebuild finds the Distribution identity (preserve the login keychain).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN"
          rm -f "$CERT"
          bundle exec fastlane ios beta
