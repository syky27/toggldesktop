# CI for the Flutter port (FP-61): build the C++ core, then analyze/test the
# Flutter app — including the real FFI smoke test against the built library.
name: flutter-port

on:
  push:
    branches: ['**']
    paths:
      - 'app/**'
      - 'src/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'

jobs:
  analyze-test-linux:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install core build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoco-dev libjsoncpp-dev libssl-dev \
            libxmu-dev libx11-dev cmake ninja-build

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build the C++ core (libTogglDesktopLibrary.so)
        working-directory: .
        run: |
          cmake -S app/native -B build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native -j"$(nproc)"

      - name: pub get
        run: flutter pub get

      - name: Regenerate FFI bindings (verifies header ↔ ffigen)
        run: dart run ffigen --config ffigen.yaml

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test test/widget_test.dart

      - name: FFI smoke test against the built core
        run: flutter test test/ffi_smoke_test.dart
        env:
          REDTICK_CORE_LIB: ${{ github.workspace }}/build/native/libTogglDesktopLibrary.so

  build-matrix:
    # Best-effort per-platform build sanity. Mobile/desktop packaging is
    # finalized in FP-60/62/63/64.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
          - os: windows-2022
            target: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable Linux desktop deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoco-dev libjsoncpp-dev libssl-dev \
            libxmu-dev libx11-dev ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build ${{ matrix.target }} --debug

  android-apk:
    # Full Android build (FP-11): GitHub runners can reach dl.google.com (the NDK
    # host blocked in the dev sandbox), so the core + its native deps are
    # cross-compiled here and packaged into an APK.
    runs-on: ubuntu-24.04
    env:
      ABIS: 'arm64-v8a armeabi-v7a x86_64'
      ANDROID_API: '24'
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache cross-built native deps (OpenSSL/Poco/jsoncpp)
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: app/native/android/.deps-prefix
          key: android-deps-${{ hashFiles('app/native/android/build-deps.sh') }}-${{ env.ABIS }}

      - name: Cross-compile native deps per ABI
        if: steps.deps-cache.outputs.cache-hit != 'true'
        working-directory: app/native/android
        run: |
          for abi in $ABIS; do ./build-deps.sh "$abi"; done

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Verify the core .so is packaged in the APK
        run: |
          set -e
          APK=build/app/outputs/flutter-apk/app-debug.apk
          unzip -l "$APK" | grep -E 'lib/(arm64-v8a|x86_64)/libTogglDesktopLibrary.so'

      - uses: actions/upload-artifact@v4
        with:
          name: redtick-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  macos-desktop:
    # macOS desktop (FP-60 for mac): build the core dylib from Homebrew deps,
    # prove the FFI works on macOS, then build the Flutter macOS app.
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install core build deps (Homebrew)
        run: brew install poco jsoncpp openssl@3 cmake ninja

      - name: Build the C++ core (libTogglDesktopLibrary.dylib)
        working-directory: .
        run: |
          cmake -S app/native -B build/native -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix)"
          cmake --build build/native -j"$(sysctl -n hw.ncpu)"
          test -f build/native/libTogglDesktopLibrary.dylib

      - run: flutter pub get

      - name: FFI smoke test against the built core (macOS)
        run: flutter test test/ffi_smoke_test.dart
        env:
          REDTICK_CORE_LIB: ${{ github.workspace }}/build/native/libTogglDesktopLibrary.dylib

      - name: Build macOS app
        run: flutter build macos --debug

      - uses: actions/upload-artifact@v4
        with:
          name: redtick-macos-app
          path: app/build/macos/Build/Products/Debug/*.app
          if-no-files-found: warn

  ios:
    # iOS (FP-12): cross-build the deps + the core static lib for iphoneos, and
    # build the Flutter iOS app (unsigned). Linking the static core into the
    # Runner (so it's loaded at runtime) is the remaining Xcode wiring — see
    # app/native/ios/README.md.
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache cross-built iOS deps
        id: ios-deps-cache
        uses: actions/cache@v4
        with:
          path: app/native/ios/.deps-prefix
          key: ios-deps-${{ hashFiles('app/native/ios/build-deps-ios.sh') }}

      - name: Cross-build iOS deps (OpenSSL/Poco/jsoncpp, device arm64)
        if: steps.ios-deps-cache.outputs.cache-hit != 'true'
        working-directory: app/native/ios
        run: ./build-deps-ios.sh iphoneos arm64

      - name: Cross-compile the core static lib for iOS (verifies it builds)
        working-directory: .
        run: |
          cmake -S app/native -B build/ios \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DREDTICK_DEPS_PREFIX="${{ github.workspace }}/app/native/ios/.deps-prefix/iphoneos"
          cmake --build build/ios -j"$(sysctl -n hw.ncpu)"
          find build/ios -name 'libTogglDesktopLibrary.a' -print -exec test -f {} \;

      - run: flutter pub get

      - name: Build iOS app (unsigned)
        run: flutter build ios --debug --no-codesign
