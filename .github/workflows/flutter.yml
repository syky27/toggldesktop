# CI for the Flutter port (FP-61): build the C++ core, then analyze/test the
# Flutter app — including the real FFI smoke test against the built library.
name: flutter-port

on:
  push:
    branches: ['**']
    paths:
      - 'app/**'
      - 'src/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'
      - 'src/**'

jobs:
  analyze-test-linux:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install core build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoco-dev libjsoncpp-dev libssl-dev \
            libxmu-dev libx11-dev cmake ninja-build

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build the C++ core (libTogglDesktopLibrary.so)
        working-directory: .
        run: |
          cmake -S app/native -B build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native -j"$(nproc)"

      - name: pub get
        run: flutter pub get

      - name: Regenerate FFI bindings (verifies header ↔ ffigen)
        run: dart run ffigen --config ffigen.yaml

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test test/widget_test.dart

      - name: FFI smoke test against the built core
        run: flutter test test/ffi_smoke_test.dart
        env:
          REDTICK_CORE_LIB: ${{ github.workspace }}/build/native/libTogglDesktopLibrary.so

  build-matrix:
    # Best-effort per-platform build sanity. Mobile/desktop packaging is
    # finalized in FP-60/62/63/64.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
          - os: macos-14
            target: macos
          - os: windows-2022
            target: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Enable Linux desktop deps
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpoco-dev libjsoncpp-dev libssl-dev \
            libxmu-dev libx11-dev ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build ${{ matrix.target }} --debug
