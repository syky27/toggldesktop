# Android release pipeline for the `redtick` Flutter app.
# On a v* tag (or manual dispatch): decode the upload keystore from secrets, build
# a signed AAB (for Google Play) + split APKs (for sideload), attach the APKs to
# the same draft GitHub Release the desktop workflow creates for the tag, and —
# when a Play service-account secret is present — upload the AAB to Google Play
# via fastlane supply.
#
# Gated on the Android signing secrets: forks / secret-less runs skip cleanly
# (Android can't produce a release-signed build without the upload keystore). Only
# maintainer tag pushes / dispatch can produce a signed build. See
# docs/ANDROID_RELEASE.md.
name: android-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Detect signing capability
        id: signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" \
             && -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
             && -n "${{ secrets.ANDROID_KEY_ALIAS }}" \
             && -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android signing secrets absent — skipping release build."
          fi

      - name: Detect Play upload capability
        id: play
        shell: bash
        run: |
          if [[ -n "${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Play service-account secret — APK→GitHub only (no Play upload)."
          fi

      - name: Compute version + tag
        id: ver
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$REF"; RAW="${REF#v}"; VERSION="${RAW%%+*}"
          else
            VERSION="${PUBSPEC_VERSION%%+*}"; TAG="${REF//\//-}-dev"
          fi
          # Play requires a strictly-increasing versionCode; GITHUB_RUN_NUMBER is
          # monotonic per workflow.
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        if: steps.signing.outputs.enabled == 'true'
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        if: steps.signing.outputs.enabled == 'true'
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
        if: steps.signing.outputs.enabled == 'true'

      - name: Decode keystore + write key.properties
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/redtick-upload.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$GITHUB_WORKSPACE/app/android/redtick-upload.jks
          EOF

      - name: Build signed AAB + split APKs
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          DD="--dart-define=REDTICK_RELEASE_TAG=${{ steps.ver.outputs.tag }} --dart-define=REDTICK_RELEASE_REPOSITORY=${{ github.repository }}"
          flutter build appbundle --release \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.build }} $DD
          flutter build apk --release --split-per-abi \
            --build-name=${{ steps.ver.outputs.version }} \
            --build-number=${{ steps.ver.outputs.build }} $DD

      - name: Stage release artifacts
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          for f in build/app/outputs/flutter-apk/app-*-release.apk; do
            abi="$(basename "$f")"; abi="${abi#app-}"; abi="${abi%-release.apk}"
            cp "$f" "dist/redtick-${{ steps.ver.outputs.tag }}-$abi.apk"
          done
          cp build/app/outputs/bundle/release/app-release.aab \
            "dist/redtick-${{ steps.ver.outputs.tag }}.aab"
          ls -l dist

      - uses: actions/upload-artifact@v4
        if: steps.signing.outputs.enabled == 'true'
        with:
          name: dist-android
          path: app/dist/redtick-*
          if-no-files-found: error

      # ---- Play upload (dormant until the service-account secret is set) ----
      - uses: ruby/setup-ruby@v1
        if: steps.signing.outputs.enabled == 'true' && steps.play.outputs.enabled == 'true'
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: app

      - name: Upload AAB to Google Play
        if: steps.signing.outputs.enabled == 'true' && steps.play.outputs.enabled == 'true'
        env:
          GOOGLE_PLAY_JSON_KEY_BASE64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          set -euo pipefail
          echo -n "$GOOGLE_PLAY_JSON_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/play.json"
          GOOGLE_PLAY_JSON_KEY="$RUNNER_TEMP/play.json" bundle exec fastlane android beta
          rm -f "$RUNNER_TEMP/play.json"

      - name: Clean up signing material
        if: always() && steps.signing.outputs.enabled == 'true'
        run: rm -f android/key.properties android/redtick-upload.jks

  # Attach the APKs (+ AAB) to the draft GitHub Release for this tag. softprops
  # matches by tag and updates the existing draft, so these coalesce with the
  # desktop artifacts (the desktop release job runs later — macOS notarization —
  # so the draft usually already exists or is created here first). Only files are
  # set here, leaving the desktop job's generated notes/body intact.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-android
          path: dist
        continue-on-error: true # secret-less runs produce no artifact

      # Files only — don't set body/notes here, so this never clobbers the
      # desktop job's generated release notes (the Android download section lives
      # in desktop-release.yml's body). Coalesces onto the same draft by tag.
      - name: Attach Android APKs to the draft release
        if: hashFiles('dist/redtick-*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist/redtick-*.apk
          draft: true
