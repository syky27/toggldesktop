# Android CI smoke test for the `redtick` Flutter app.
#
# Builds a RELEASE-mode APK and actually LAUNCHES it on an emulator, asserting the
# app stays alive. This catches release-only startup crashes that a plain build
# can't — e.g. R8 stripping WorkManager's Room class (the crash v1.7.3 shipped,
# because CI built the APK but never ran it). Runs on every push/PR to app/**.
name: android-ci

on:
  push:
    paths: ['app/**', '.github/workflows/android-ci.yml']
  pull_request:
    paths: ['app/**', '.github/workflows/android-ci.yml']
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    # Backstop: a normal run is ~15-20 min. Without this a hung emulator (boot
    # never completes) runs to GitHub's 6-hour default.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Release mode is what ships and what crashed. Debug-signed via the
      # build.gradle.kts fallback (signing doesn't affect R8 / startup behaviour).
      # x86_64 only — matches the emulator and keeps it fast.
      - name: Build release APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Enable KVM
        working-directory: .
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch emulator + smoke test
        # Bound the hang-prone step: emulator boot ~3-5 min + smoke ~30s. If the
        # emulator never boots, fail in ~12 min instead of hanging the job.
        timeout-minutes: 12
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          working-directory: app
          # A single command → one shell process (android-emulator-runner runs each
          # inline line in its own shell, which would drop shared variables).
          script: ./tool/android_smoke_test.sh
