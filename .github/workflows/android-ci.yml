# Android CI smoke test for the `redtick` Flutter app.
#
# Builds a RELEASE-mode APK and actually LAUNCHES it on an emulator, asserting the
# app stays alive. This catches release-only startup crashes that a plain build
# can't — e.g. R8 stripping WorkManager's Room class (the crash v1.7.3 shipped,
# because CI built the APK but never ran it). Runs on every push/PR to app/**.
name: android-ci

on:
  push:
    paths: ['app/**', '.github/workflows/android-ci.yml']
  pull_request:
    paths: ['app/**', '.github/workflows/android-ci.yml']
  workflow_dispatch:

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.3

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      # Release mode is what ships and what crashed. Debug-signed via the
      # build.gradle.kts fallback (signing doesn't affect R8 / startup behaviour).
      # x86_64 only — matches the emulator and keeps it fast.
      - name: Build release APK (x86_64)
        run: flutter build apk --release --target-platform android-x64

      - name: Enable KVM
        working-directory: .
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Launch emulator + smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          working-directory: app
          script: |
            set -uo pipefail
            APK=build/app/outputs/flutter-apk/app-release.apk
            PKG=cz.syky.redtick.redtick
            echo "Installing $APK"
            adb install -r "$APK"
            adb logcat -c
            adb shell am start -n "$PKG/.MainActivity"
            # Watch ~30s: fail fast on a FATAL EXCEPTION; otherwise require the
            # process to be alive at the end (a startup crash leaves it dead).
            for i in $(seq 1 30); do
              if adb logcat -d | grep -q "FATAL EXCEPTION"; then
                echo "::error::FATAL EXCEPTION after launch — release-mode startup crash."
                adb logcat -d | grep -A40 "FATAL EXCEPTION" | head -60
                exit 1
              fi
              sleep 1
            done
            PID="$(adb shell pidof "$PKG" | tr -d '[:space:]')"
            if [ -z "$PID" ]; then
              echo "::error::App not running ~30s after launch — release-mode startup crash."
              adb logcat -d -t 500 | grep -iE "FATAL|AndroidRuntime|E flutter|Exception|InitializationProvider|redtick" | tail -60 || true
              exit 1
            fi
            echo "Smoke test passed: $PKG launched (pid $PID) and stayed alive."
